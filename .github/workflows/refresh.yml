name: refresh-forecast

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - name: Restore carried state from data branch
        run: |
          mkdir -p out
          if git fetch origin data 2>/dev/null; then
            git checkout origin/data -- history.csv 2>/dev/null && mv history.csv out/ || true
            git checkout origin/data -- odds_state.json 2>/dev/null && mv odds_state.json out/ || true
            git checkout origin/data -- market.json 2>/dev/null && mv market.json out/ || true
            git checkout origin/data -- market_h2h.json 2>/dev/null && mv market_h2h.json out/ || true
            git checkout origin/data -- cache_fixtures.json 2>/dev/null && cp cache_fixtures.json data/ && mv cache_fixtures.json out/ || true
            git checkout origin/data -- injury_minutes_cache.json 2>/dev/null && mv injury_minutes_cache.json out/ || true
            git checkout origin/data -- blend_log.json 2>/dev/null && mv blend_log.json out/ || true
          fi

      - name: Run forecast
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python pipeline/refresh.py --nsims 50000

      - name: Publish to data branch
        run: |
          cp data/cache_fixtures.json out/ 2>/dev/null || true
          cd out
          git init -b data
          git config user.name "wc-odds-bot"
          git config user.email "actions@users.noreply.github.com"
          git add forecast.json history.csv
          git add odds_state.json market.json market_h2h.json cache_fixtures.json injury_minutes_cache.json blend_log.json 2>/dev/null || true
          git commit -m "refresh $(date -u +%FT%TZ)"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data
# registered 2026-06-12
