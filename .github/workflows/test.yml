name: test

on:
  push:
    branches: [master]
    paths: ["pipeline/**"]
  pull_request:
    paths: ["pipeline/**"]

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - run: pip install -r pipeline/requirements.txt

      - run: python -m pytest pipeline/tests/ -v
